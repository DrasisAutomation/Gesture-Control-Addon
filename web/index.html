<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Control - Home Assistant Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        /* Camera feed */
        .camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: brightness(1.05);
            z-index: 1;
        }

        /* Gesture display at bottom right corner */
        .gesture-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            min-width: 180px;
            pointer-events: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .current-gesture {
            text-align: center;
        }

        .gesture-icon {
            font-size: 64px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
            transition: transform 0.1s ease;
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .gesture-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .finger-count {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 5px 0;
        }

        .gesture-guide {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .guide-item {
            text-align: center;
        }

        .guide-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .guide-text {
            font-size: 10px;
            color: #ccc;
            margin-top: 3px;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .ha-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .cooldown-timer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 11px;
            color: #ffaa00;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .gesture-history {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 12px;
            color: #0f0;
            font-family: monospace;
            z-index: 1000;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .gesture-display {
                padding: 10px 15px;
                min-width: 140px;
            }
            .gesture-icon {
                font-size: 48px;
            }
            .gesture-name {
                font-size: 16px;
            }
            .guide-icon {
                font-size: 22px;
            }
            .status, .ha-status {
                font-size: 10px;
                padding: 5px 10px;
            }
            .gesture-history {
                font-size: 10px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MJPEG stream from backend -->
        <img id="cameraFeed" class="camera-feed" src="/video_feed" alt="Camera Feed">
        
        <div class="gesture-display">
            <div class="current-gesture">
                <div class="gesture-icon" id="gestureIcon">🤚</div>
                <div class="gesture-name" id="gestureName">No Hand</div>
                <div class="finger-count" id="fingerCount">Fingers: 0</div>
            </div>
            <div class="divider"></div>
            <div class="gesture-guide">
                <div class="guide-item">
                    <div class="guide-icon">✊</div>
                    <div class="guide-text">Fist → Strip ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✌️</div>
                    <div class="guide-text">2 Fingers → Row3 ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">👌</div>
                    <div class="guide-text">3 Fingers → Row3 OFF</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✋</div>
                    <div class="guide-text">Palm → Strip OFF</div>
                </div>
            </div>
        </div>
        
        <div class="status" id="status">Connecting to backend...</div>
        <div class="ha-status" id="haStatus">HA: Connected ✓</div>
        <div class="cooldown-timer" id="cooldownTimer">Cooldown: Ready</div>
        <div class="gesture-history" id="gestureHistory">Waiting for gesture...</div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // DOM Elements
        const gestureIconEl = document.getElementById('gestureIcon');
        const gestureNameEl = document.getElementById('gestureName');
        const fingerCountEl = document.getElementById('fingerCount');
        const statusEl = document.getElementById('status');
        const haStatusEl = document.getElementById('haStatus');
        const cooldownTimerEl = document.getElementById('cooldownTimer');
        const gestureHistoryEl = document.getElementById('gestureHistory');
        
        // Gesture history
        let lastGestureAction = "";
        let actionTimeout = null;
        
        // WebSocket connection to backend
        const socket = io(window.location.origin, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000
        });
        
        // Handle connection events
        socket.on('connect', () => {
            console.log('✅ Connected to backend WebSocket');
            statusEl.textContent = '✅ Connected';
            statusEl.style.color = '#0f0';
        });
        
        socket.on('disconnect', () => {
            console.log('❌ Disconnected from backend');
            statusEl.textContent = '❌ Disconnected';
            statusEl.style.color = '#f00';
        });
        
        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
            statusEl.textContent = '⚠️ Connection error';
            statusEl.style.color = '#ffaa00';
        });
        
        // Receive gesture updates from backend
        socket.on('gesture_update', (data) => {
            // Update gesture display with animation
            const oldIcon = gestureIconEl.textContent;
            const newIcon = data.gestureIcon || '🤚';
            
            if (oldIcon !== newIcon) {
                gestureIconEl.style.animation = 'none';
                gestureIconEl.offsetHeight; // Trigger reflow
                gestureIconEl.style.animation = 'bounce 0.3s ease';
            }
            
            gestureIconEl.textContent = newIcon;
            gestureNameEl.textContent = data.gestureName || 'No Hand';
            fingerCountEl.textContent = `Fingers: ${data.fingerCount || 0}`;
            
            // Update status based on detection
            if (data.status === 'detecting') {
                statusEl.textContent = `🎥 ${data.gestureName}`;
                statusEl.style.color = '#0f0';
            } else if (data.status === 'no_hand') {
                statusEl.textContent = '👋 No hand';
                statusEl.style.color = '#ffaa00';
            }
            
            // Update cooldown timer
            if (data.cooldownRemaining > 0) {
                cooldownTimerEl.textContent = `⏱️ Cooldown: ${data.cooldownRemaining.toFixed(1)}s`;
                cooldownTimerEl.style.color = '#ffaa00';
            } else {
                cooldownTimerEl.textContent = '⚡ Cooldown: Ready';
                cooldownTimerEl.style.color = '#0f0';
            }
            
            // Show last action
            if (data.lastAction && data.lastAction !== '') {
                lastGestureAction = data.lastAction;
                gestureHistoryEl.textContent = `🎯 Last: ${data.lastAction}`;
                gestureHistoryEl.style.color = '#0f0';
                
                // Also show in HA status
                haStatusEl.textContent = `⚡ ${data.lastAction}`;
                haStatusEl.style.color = '#0f0';
                
                // Reset after 2 seconds
                if (actionTimeout) clearTimeout(actionTimeout);
                actionTimeout = setTimeout(() => {
                    if (socket.connected) {
                        haStatusEl.textContent = 'HA: Connected ✓';
                        haStatusEl.style.color = '#0f0';
                    }
                    gestureHistoryEl.textContent = `✓ Gesture detected`;
                    setTimeout(() => {
                        if (gestureHistoryEl.textContent === '✓ Gesture detected') {
                            gestureHistoryEl.textContent = 'Ready for gestures...';
                            gestureHistoryEl.style.color = '#888';
                        }
                    }, 2000);
                }, 2000);
            }
        });
        
        // Initial HA status
        haStatusEl.textContent = 'HA: Connected ✓';
        haStatusEl.style.color = '#0f0';
        
        // Camera feed error handling
        const cameraFeed = document.getElementById('cameraFeed');
        cameraFeed.onerror = () => {
            console.log('Camera feed not available');
            statusEl.textContent = '⚠️ Camera feed unavailable';
            statusEl.style.color = '#ffaa00';
        };
        
        cameraFeed.onload = () => {
            console.log('Camera feed loaded');
            if (statusEl.textContent === '⚠️ Camera feed unavailable') {
                statusEl.textContent = '✅ Connected';
                statusEl.style.color = '#0f0';
            }
        };
        
        console.log('Frontend UI ready - waiting for gesture detection...');
    </script>
</body>
</html>
