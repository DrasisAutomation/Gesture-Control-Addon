<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Control - Home Assistant Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Gesture display at bottom right corner */
        .gesture-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            min-width: 180px;
            pointer-events: none;
        }

        .current-gesture {
            text-align: center;
        }

        .gesture-icon {
            font-size: 64px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .gesture-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .finger-count {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }

        .last-action {
            font-size: 12px;
            color: #0f0;
            margin-top: 5px;
            font-family: monospace;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 5px 0;
        }

        .gesture-guide {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .guide-item {
            text-align: center;
        }

        .guide-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .guide-text {
            font-size: 10px;
            color: #ccc;
            margin-top: 3px;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .ha-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .gesture-display {
                padding: 10px 15px;
                min-width: 140px;
            }
            .gesture-icon {
                font-size: 48px;
            }
            .gesture-name {
                font-size: 16px;
            }
            .guide-icon {
                font-size: 22px;
            }
            .status, .ha-status {
                font-size: 10px;
                padding: 5px 10px;
            }
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        
        <div class="gesture-display">
            <div class="current-gesture">
                <div class="gesture-icon" id="gestureIcon">🤚</div>
                <div class="gesture-name" id="gestureName">No Hand</div>
                <div class="finger-count" id="fingerCount">Fingers: 0</div>
                <div class="last-action" id="lastAction">Last: --</div>
            </div>
            <div class="divider"></div>
            <div class="gesture-guide">
                <div class="guide-item">
                    <div class="guide-icon">✊</div>
                    <div class="guide-text">Fist → Strip ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✌️</div>
                    <div class="guide-text">2 Fingers → Row ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">👌</div>
                    <div class="guide-text">3 Fingers → Row OFF</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✋</div>
                    <div class="guide-text">Palm → Strip OFF</div>
                </div>
            </div>
        </div>
        
        <div class="status" id="status">Connecting...</div>
        <div class="ha-status" id="haStatus">HA: Connecting...</div>
    </div>

    <script>
        // Socket.IO connection
        const socket = io(window.location.origin);
        
        // DOM elements
        const video = document.getElementById('video');
        const gestureIconEl = document.getElementById('gestureIcon');
        const gestureNameEl = document.getElementById('gestureName');
        const fingerCountEl = document.getElementById('fingerCount');
        const lastActionEl = document.getElementById('lastAction');
        const statusEl = document.getElementById('status');
        const haStatusEl = document.getElementById('haStatus');
        
        // Set video source to backend stream
        video.src = '/video';
        video.play().catch(e => console.log('Video autoplay blocked:', e));
        
        // Socket event handlers
        socket.on('connect', () => {
            console.log('Socket.IO connected');
            statusEl.textContent = '✅ Connected';
            statusEl.style.color = '#0f0';
        });
        
        socket.on('disconnect', () => {
            console.log('Socket.IO disconnected');
            statusEl.textContent = '⚠️ Disconnected';
            statusEl.style.color = '#ffaa00';
        });
        
        socket.on('status', (data) => {
            console.log('Status:', data);
            if (data.haConnected !== undefined) {
                haStatusEl.textContent = data.haConnected ? 'HA: Connected ✓' : 'HA: Disconnected';
                haStatusEl.style.color = data.haConnected ? '#0f0' : '#ffaa00';
            }
            if (data.message) {
                statusEl.textContent = data.message;
            }
        });
        
        socket.on('gesture', (data) => {
            console.log('Gesture:', data);
            
            // Update UI
            gestureIconEl.textContent = data.gestureIcon || getIconForFingers(data.fingerCount);
            gestureNameEl.textContent = data.gestureName || `${data.fingerCount} Fingers`;
            fingerCountEl.textContent = `Fingers: ${data.fingerCount}`;
            
            if (data.lastAction) {
                lastActionEl.textContent = `Last: ${data.lastAction}`;
                lastActionEl.style.opacity = '1';
                setTimeout(() => {
                    lastActionEl.style.opacity = '0.7';
                }, 2000);
            }
            
            // Update HA status from gesture data
            if (data.haConnected !== undefined) {
                haStatusEl.textContent = data.haConnected ? 'HA: Connected ✓' : 'HA: Disconnected';
                haStatusEl.style.color = data.haConnected ? '#0f0' : '#ffaa00';
            }
        });
        
        function getIconForFingers(count) {
            const icons = {
                0: '✊',
                2: '✌️',
                3: '👌',
                5: '✋'
            };
            return icons[count] || '🖐️';
        }
        
        // Handle video errors
        video.addEventListener('error', (e) => {
            console.error('Video error:', e);
            statusEl.textContent = '❌ Video stream error';
            statusEl.style.color = '#f00';
        });
        
        // Connection timeout fallback
        setTimeout(() => {
            if (socket.disconnected) {
                statusEl.textContent = '⚠️ Waiting for connection...';
            }
        }, 3000);
    </script>
</body>
</html>
