<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Control - RTSP Camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #videoStream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Gesture display overlay */
        .gesture-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            min-width: 200px;
            pointer-events: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .current-gesture {
            text-align: center;
        }

        .gesture-icon {
            font-size: 64px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
            transition: transform 0.2s ease;
        }

        .gesture-icon.pulse {
            animation: pulse 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .gesture-name {
            font-size: 20px;
            font-weight: bold;
            color: #0f0;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .finger-count {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 5px 0;
        }

        .gesture-guide {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .guide-item {
            text-align: center;
        }

        .guide-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .guide-text {
            font-size: 10px;
            color: #ccc;
            margin-top: 3px;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .ha-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .cooldown {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 768px) {
            .gesture-display {
                padding: 10px 15px;
                min-width: 160px;
            }
            .gesture-icon {
                font-size: 48px;
            }
            .gesture-name {
                font-size: 16px;
            }
            .guide-icon {
                font-size: 22px;
            }
            .guide-text {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="videoStream" src="/video" alt="Camera Stream">
        
        <div class="gesture-display">
            <div class="current-gesture">
                <div class="gesture-icon" id="gestureIcon">🤚</div>
                <div class="gesture-name" id="gestureName">No Hand</div>
                <div class="finger-count" id="fingerCount">Fingers: 0</div>
            </div>
            <div class="divider"></div>
            <div class="gesture-guide">
                <div class="guide-item">
                    <div class="guide-icon">✊</div>
                    <div class="guide-text">Fist → Strip ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✌️</div>
                    <div class="guide-text">Peace → Row3 ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">👌</div>
                    <div class="guide-text">Three → Row3 OFF</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✋</div>
                    <div class="guide-text">Palm → Strip OFF</div>
                </div>
            </div>
        </div>
        
        <div class="status" id="status">🟡 Connecting to camera...</div>
        <div class="ha-status" id="haStatus">🔌 HA: Connecting...</div>
        <div class="cooldown" id="cooldown">⏱️ Ready</div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const gestureIcon = document.getElementById('gestureIcon');
        const gestureName = document.getElementById('gestureName');
        const fingerCount = document.getElementById('fingerCount');
        const statusEl = document.getElementById('status');
        const haStatusEl = document.getElementById('haStatus');
        const cooldownEl = document.getElementById('cooldown');
        const videoStream = document.getElementById('videoStream');
        
        let socket = null;
        let lastGesture = null;
        
        // Reload video stream if it fails
        videoStream.onerror = () => {
            statusEl.innerHTML = '❌ Camera stream error - reconnecting...';
            statusEl.style.color = '#f00';
            setTimeout(() => {
                videoStream.src = '/video?_=' + Date.now();
            }, 3000);
        };
        
        videoStream.onload = () => {
            statusEl.innerHTML = '✅ Camera active - Show your hand!';
            statusEl.style.color = '#0f0';
        };
        
        // WebSocket connection for gesture data
        function connectWebSocket() {
            socket = io(window.location.origin, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 10
            });
            
            socket.on('connect', () => {
                console.log('✅ WebSocket connected');
                haStatusEl.innerHTML = '✅ HA: Connected';
                haStatusEl.style.color = '#0f0';
            });
            
            socket.on('disconnect', () => {
                console.log('❌ WebSocket disconnected');
                haStatusEl.innerHTML = '🔌 HA: Reconnecting...';
                haStatusEl.style.color = '#ffaa00';
            });
            
            socket.on('gesture_update', (data) => {
                // Update UI with gesture data
                if (data.gestureIcon !== gestureIcon.textContent) {
                    gestureIcon.classList.add('pulse');
                    setTimeout(() => gestureIcon.classList.remove('pulse'), 200);
                }
                
                gestureIcon.textContent = data.gestureIcon;
                gestureName.textContent = data.gestureName;
                fingerCount.textContent = `Fingers: ${data.fingerCount}`;
                
                // Update status
                if (data.status === 'detecting') {
                    statusEl.innerHTML = '🟢 Detecting hand';
                    statusEl.style.color = '#0f0';
                } else {
                    statusEl.innerHTML = '🟡 No hand detected';
                    statusEl.style.color = '#ffaa00';
                }
                
                // Update cooldown
                if (data.cooldownRemaining > 0) {
                    cooldownEl.innerHTML = `⏱️ Cooldown: ${data.cooldownRemaining.toFixed(1)}s`;
                    cooldownEl.style.color = '#ffaa00';
                } else {
                    cooldownEl.innerHTML = '⚡ Ready';
                    cooldownEl.style.color = '#0f0';
                }
                
                // Show last action if any
                if (data.lastAction && data.lastAction !== '') {
                    const actionMsg = document.createElement('div');
                    actionMsg.className = 'action-toast';
                    actionMsg.textContent = `🎯 ${data.lastAction}`;
                    document.body.appendChild(actionMsg);
                    setTimeout(() => actionMsg.remove(), 2000);
                }
            });
            
            socket.on('action_triggered', (data) => {
                console.log('Action triggered:', data);
                // Flash the gesture display
                gestureIcon.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    gestureIcon.style.transform = 'scale(1)';
                }, 200);
            });
        }
        
        // Add CSS for action toast
        const style = document.createElement('style');
        style.textContent = `
            .action-toast {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 255, 0, 0.9);
                color: #000;
                padding: 15px 30px;
                border-radius: 50px;
                font-size: 24px;
                font-weight: bold;
                z-index: 2000;
                animation: fadeOut 2s ease forwards;
                pointer-events: none;
                white-space: nowrap;
                font-family: monospace;
            }
            
            @keyframes fadeOut {
                0% {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
                70% {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1.1);
                }
                100% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(1.2);
                }
            }
        `;
        document.head.appendChild(style);
        
        // Initialize
        connectWebSocket();
        
        // Health check every 10 seconds
        setInterval(async () => {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (!data.camera_active) {
                    statusEl.innerHTML = '⚠️ Camera inactive - reconnecting...';
                    statusEl.style.color = '#ffaa00';
                }
                if (!data.ha_connected) {
                    haStatusEl.innerHTML = '🔌 HA: Disconnected';
                    haStatusEl.style.color = '#f00';
                }
            } catch (e) {
                console.error('Health check failed:', e);
            }
        }, 10000);
        
        console.log('Frontend ready - waiting for video stream');
    </script>
</body>
</html>
