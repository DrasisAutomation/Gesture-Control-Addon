<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Control Pro - Home Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            transform: scaleX(-1);
        }

        video {
            transform: scaleX(-1);
            filter: brightness(1.05);
        }

        /* Video status overlay */
        .video-status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .video-status.hidden {
            display: none;
        }

        .video-status-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .video-status-text {
            font-size: 18px;
            color: #fff;
            font-weight: bold;
        }

        .video-status-sub {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        /* Gesture display */
        .gesture-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            min-width: 180px;
            pointer-events: none;
        }

        .current-gesture {
            text-align: center;
        }

        .gesture-icon {
            font-size: 64px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
            transition: transform 0.1s ease;
        }

        .gesture-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .finger-count {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 5px 0;
        }

        .gesture-guide {
            display: flex;
            gap: 20px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .guide-item {
            text-align: center;
        }

        .guide-icon {
            font-size: 28px;
        }

        .guide-text {
            font-size: 10px;
            color: #ccc;
            margin-top: 3px;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .ha-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .cooldown-timer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 11px;
            color: #ffaa00;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .gesture-pulse {
            animation: pulse 0.2s ease;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .blink {
            animation: blink 1s infinite;
        }

        @media (max-width: 768px) {
            .gesture-display {
                padding: 10px 15px;
                min-width: 140px;
            }
            .gesture-icon {
                font-size: 48px;
            }
            .gesture-name {
                font-size: 16px;
            }
            .guide-icon {
                font-size: 22px;
            }
            .status, .ha-status {
                font-size: 10px;
                padding: 5px 10px;
            }
            .video-status-text {
                font-size: 14px;
            }
            .video-status-icon {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <!-- Video Status Overlay -->
        <div id="videoStatus" class="video-status">
            <div class="video-status-icon">📹</div>
            <div class="video-status-text">Initializing Camera...</div>
            <div class="video-status-sub">Please wait</div>
        </div>
        
        <div class="gesture-display">
            <div class="current-gesture">
                <div class="gesture-icon" id="gestureIcon">🤚</div>
                <div class="gesture-name" id="gestureName">No Hand</div>
                <div class="finger-count" id="fingerCount">Fingers: 0</div>
            </div>
            <div class="divider"></div>
            <div class="gesture-guide">
                <div class="guide-item">
                    <div class="guide-icon">✊</div>
                    <div class="guide-text">Fist → Strip ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✌️</div>
                    <div class="guide-text">2 Fingers → Row3 ON</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">👌</div>
                    <div class="guide-text">3 Fingers → Row3 OFF</div>
                </div>
                <div class="guide-item">
                    <div class="guide-icon">✋</div>
                    <div class="guide-text">Palm → Strip OFF</div>
                </div>
            </div>
        </div>
        
        <div class="status" id="status">Initializing...</div>
        <div class="ha-status" id="haStatus">HA: Connecting...</div>
        <div class="cooldown-timer" id="cooldownTimer">⚡ Ready</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const canvasCtx = canvas.getContext('2d');
        const gestureIconEl = document.getElementById('gestureIcon');
        const gestureNameEl = document.getElementById('gestureName');
        const fingerCountEl = document.getElementById('fingerCount');
        const statusEl = document.getElementById('status');
        const haStatusEl = document.getElementById('haStatus');
        const cooldownTimerEl = document.getElementById('cooldownTimer');
        const videoStatusDiv = document.getElementById('videoStatus');
        
        let camera = null;
        let hands = null;
        let videoActive = false;
        let lastFingerCount = -1;
        
        // Update video status overlay
        function updateVideoStatus(icon, text, subtext, isError = false) {
            const iconEl = videoStatusDiv.querySelector('.video-status-icon');
            const textEl = videoStatusDiv.querySelector('.video-status-text');
            const subEl = videoStatusDiv.querySelector('.video-status-sub');
            
            iconEl.textContent = icon;
            textEl.textContent = text;
            subEl.textContent = subtext;
            
            if (isError) {
                videoStatusDiv.style.borderColor = '#f00';
                textEl.style.color = '#f00';
            } else {
                videoStatusDiv.style.borderColor = '#0f0';
                textEl.style.color = '#0f0';
            }
        }
        
        function hideVideoStatus() {
            videoStatusDiv.classList.add('hidden');
        }
        
        function showVideoStatus() {
            videoStatusDiv.classList.remove('hidden');
        }
        
        // ================== GESTURE DETECTION ==================
        function countExtendedFingers(landmarks) {
            if (!landmarks) return 0;
            
            let count = 0;
            
            // Index finger (tip 8 vs pip 6)
            if (landmarks[8].y < landmarks[6].y - 0.03) count++;
            
            // Middle finger (tip 12 vs pip 10)
            if (landmarks[12].y < landmarks[10].y - 0.03) count++;
            
            // Ring finger (tip 16 vs pip 14)
            if (landmarks[16].y < landmarks[14].y - 0.02) count++;
            
            // Pinky (tip 20 vs pip 18)
            if (landmarks[20].y < landmarks[18].y - 0.02) count++;
            
            // Thumb
            const isRightHand = landmarks[5].x < landmarks[17].x;
            if (isRightHand) {
                if (landmarks[4].x < landmarks[3].x - 0.02) count++;
            } else {
                if (landmarks[4].x > landmarks[3].x + 0.02) count++;
            }
            
            return count;
        }
        
        function getGestureInfo(fingerCount) {
            switch(fingerCount) {
                case 0: return { name: 'Fist', icon: '✊' };
                case 2: return { name: '2 Fingers', icon: '✌️' };
                case 3: return { name: '3 Fingers', icon: '👌' };
                case 5: return { name: 'Palm', icon: '✋' };
                default: return { name: `${fingerCount} Finger${fingerCount !== 1 ? 's' : ''}`, icon: '🖐️' };
            }
        }
        
        function drawHand(landmarks, fingerCount, cooldownRemaining) {
            if (!landmarks) return;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            
            const connections = [
                [0,1], [1,2], [2,3], [3,4],
                [0,5], [5,6], [6,7], [7,8],
                [0,9], [9,10], [10,11], [11,12],
                [0,13], [13,14], [14,15], [15,16],
                [0,17], [17,18], [18,19], [19,20],
                [5,9], [9,13], [13,17]
            ];
            
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = '#00ff00';
            canvasCtx.lineWidth = 2.5;
            
            for (let conn of connections) {
                const p1 = landmarks[conn[0]];
                const p2 = landmarks[conn[1]];
                if (p1 && p2) {
                    canvasCtx.moveTo(p1.x * canvas.width, p1.y * canvas.height);
                    canvasCtx.lineTo(p2.x * canvas.width, p2.y * canvas.height);
                    canvasCtx.stroke();
                }
            }
            
            for (let i = 0; i < landmarks.length; i++) {
                const lm = landmarks[i];
                const x = lm.x * canvas.width;
                const y = lm.y * canvas.height;
                
                canvasCtx.beginPath();
                const isTip = [4, 8, 12, 16, 20].includes(i);
                canvasCtx.fillStyle = isTip ? '#ffd700' : '#ff4444';
                canvasCtx.arc(x, y, isTip ? 6 : 4, 0, 2 * Math.PI);
                canvasCtx.fill();
            }
            
            canvasCtx.font = "bold 24px 'Segoe UI'";
            canvasCtx.fillStyle = '#ffffff';
            canvasCtx.shadowColor = 'black';
            canvasCtx.shadowBlur = 4;
            canvasCtx.fillText(`✋ ${fingerCount}`, 20, 50);
            
            if (cooldownRemaining > 0) {
                canvasCtx.fillStyle = '#ffaa44';
                canvasCtx.fillText(`⏱️ ${cooldownRemaining.toFixed(1)}s`, 20, 95);
            }
            
            canvasCtx.shadowBlur = 0;
            canvasCtx.restore();
        }
        
        function onResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                if (videoActive) {
                    gestureIconEl.textContent = '🤚';
                    gestureNameEl.textContent = 'No Hand';
                    fingerCountEl.textContent = 'Fingers: 0';
                    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
                }
                return;
            }
            
            const landmarks = results.multiHandLandmarks[0];
            const fingerCount = countExtendedFingers(landmarks);
            const gesture = getGestureInfo(fingerCount);
            
            if (fingerCount !== lastFingerCount) {
                gestureIconEl.classList.add('gesture-pulse');
                setTimeout(() => gestureIconEl.classList.remove('gesture-pulse'), 200);
                lastFingerCount = fingerCount;
            }
            
            gestureIconEl.textContent = gesture.icon;
            gestureNameEl.textContent = gesture.name;
            fingerCountEl.textContent = `Fingers: ${fingerCount}`;
            
            const cooldownText = cooldownTimerEl.textContent;
            let cooldown = 0;
            const match = cooldownText.match(/(\d+\.?\d*)/);
            if (match) cooldown = parseFloat(match[1]);
            
            drawHand(landmarks, fingerCount, cooldown);
        }
        
        function initHandDetection() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults(onResults);
        }
        
        async function startCamera() {
            try {
                updateVideoStatus('📹', 'Requesting Camera...', 'Please allow camera access');
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    } 
                });
                
                video.srcObject = stream;
                await video.play();
                
                updateVideoStatus('✅', 'Camera Active!', 'Show your hand to camera');
                
                const setCanvasSize = () => {
                    if (video.videoWidth > 0) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        videoActive = true;
                        statusEl.textContent = '✅ Camera Active - Show Hand';
                        statusEl.style.color = '#0f0';
                        
                        // Hide video status after 2 seconds
                        setTimeout(() => {
                            hideVideoStatus();
                        }, 2000);
                        
                        return true;
                    }
                    return false;
                };
                
                let attempts = 0;
                const checkSize = setInterval(() => {
                    if (setCanvasSize() || attempts > 30) {
                        clearInterval(checkSize);
                    }
                    attempts++;
                }, 100);
                
                camera = new Camera(video, {
                    onFrame: async () => {
                        if (hands && video.videoWidth > 0 && videoActive) {
                            await hands.send({ image: video });
                        }
                    },
                    width: 1280,
                    height: 720
                });
                
                camera.start();
                
            } catch (error) {
                console.error('Camera error:', error);
                videoActive = false;
                updateVideoStatus('❌', 'Camera Error', error.message, true);
                statusEl.textContent = '❌ Camera Error: ' + error.message;
                statusEl.style.color = '#f00';
            }
        }
        
        // WebSocket connection for HA status
        let wsConnected = false;
        
        function connectBackend() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/socket.io/?EIO=4&transport=websocket`;
            
            if (typeof io !== 'undefined') {
                const socket = io();
                
                socket.on('connect', () => {
                    console.log('✅ Connected to backend');
                    wsConnected = true;
                    haStatusEl.textContent = 'HA: Connected ✓';
                    haStatusEl.style.color = '#0f0';
                });
                
                socket.on('gesture_update', (data) => {
                    if (data.cooldownRemaining > 0) {
                        cooldownTimerEl.textContent = `⏱️ Cooldown: ${data.cooldownRemaining.toFixed(1)}s`;
                        cooldownTimerEl.style.color = '#ffaa00';
                    } else {
                        cooldownTimerEl.textContent = '⚡ Ready';
                        cooldownTimerEl.style.color = '#0f0';
                    }
                    
                    if (data.lastAction && data.lastAction !== '') {
                        haStatusEl.textContent = `⚡ ${data.lastAction}`;
                        haStatusEl.style.color = '#0f0';
                        setTimeout(() => {
                            if (wsConnected) {
                                haStatusEl.textContent = 'HA: Connected ✓';
                            }
                        }, 1500);
                    }
                    
                    if (data.cameraActive !== undefined && data.cameraActive && !videoActive) {
                        statusEl.textContent = '✅ Camera Active - Detecting';
                    }
                });
                
                socket.on('disconnect', () => {
                    wsConnected = false;
                    haStatusEl.textContent = 'HA: Reconnecting...';
                    haStatusEl.style.color = '#ffaa00';
                });
            } else {
                haStatusEl.textContent = 'HA: Connected ✓';
                haStatusEl.style.color = '#0f0';
            }
        }
        
        // Initialize everything
        initHandDetection();
        startCamera();
        connectBackend();
        
        window.addEventListener('resize', () => {
            if (video.videoWidth > 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }
        });
        
        // Show status that camera is loading
        setTimeout(() => {
            if (!videoActive) {
                showVideoStatus();
            }
        }, 1000);
    </script>
</body>
</html>
