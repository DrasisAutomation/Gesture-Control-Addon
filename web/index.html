<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Control - H.264 Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .container { position: relative; width: 100vw; height: 100vh; background: #000; }
        video, img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .gesture-display {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px 25px; z-index: 1000;
            border: 2px solid rgba(255,255,255,0.2); min-width: 200px;
            pointer-events: none; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .current-gesture { text-align: center; }
        .gesture-icon { font-size: 64px; transition: transform 0.2s ease; }
        .gesture-icon.pulse { animation: pulse 0.3s ease; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .gesture-name { font-size: 20px; font-weight: bold; color: #0f0; margin-top: 5px; text-transform: uppercase; }
        .finger-count { font-size: 14px; color: #aaa; margin-top: 5px; }
        .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.2); margin: 10px 0; }
        .gesture-guide { display: flex; gap: 15px; justify-content: center; }
        .guide-item { text-align: center; }
        .guide-icon { font-size: 28px; }
        .guide-text { font-size: 10px; color: #ccc; margin-top: 3px; }
        .status, .ha-status, .encoder-status, .cooldown {
            position: fixed; background: rgba(0,0,0,0.7); padding: 8px 15px;
            border-radius: 20px; font-family: monospace; font-size: 12px;
            z-index: 1000; backdrop-filter: blur(5px); pointer-events: none;
        }
        .status { top: 20px; left: 20px; color: #ffaa00; }
        .ha-status { top: 20px; right: 20px; color: #ffaa00; }
        .encoder-status { top: 60px; right: 20px; color: #ffaa00; }
        .cooldown { bottom: 20px; left: 20px; color: #ffaa00; }
        .toggle-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); padding: 5px 10px;
            border-radius: 20px; color: #fff; font-size: 10px;
            cursor: pointer; z-index: 1000; backdrop-filter: blur(5px);
        }
        .action-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,255,0,0.9); color: #000; padding: 15px 30px;
            border-radius: 50px; font-size: 24px; font-weight: bold;
            z-index: 2000; animation: fadeOut 2s ease forwards; pointer-events: none;
            white-space: nowrap; font-family: monospace;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
        @media (max-width: 768px) {
            .gesture-display { padding: 10px 15px; min-width: 160px; }
            .gesture-icon { font-size: 48px; }
            .gesture-name { font-size: 16px; }
            .guide-icon { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="videoStream" autoplay muted playsinline></video>
        <img id="mjpegStream" style="display:none">
        
        <div class="gesture-display">
            <div class="current-gesture">
                <div class="gesture-icon" id="gestureIcon">🤚</div>
                <div class="gesture-name" id="gestureName">No Hand</div>
                <div class="finger-count" id="fingerCount">Fingers: 0</div>
            </div>
            <div class="divider"></div>
            <div class="gesture-guide">
                <div class="guide-item"><div class="guide-icon">✊</div><div class="guide-text">Fist → Strip ON</div></div>
                <div class="guide-item"><div class="guide-icon">✌️</div><div class="guide-text">Peace → Row3 ON</div></div>
                <div class="guide-item"><div class="guide-icon">👌</div><div class="guide-text">Three → Row3 OFF</div></div>
                <div class="guide-item"><div class="guide-icon">✋</div><div class="guide-text">Palm → Strip OFF</div></div>
            </div>
        </div>
        
        <div class="status" id="status">🟡 Connecting...</div>
        <div class="ha-status" id="haStatus">🔌 HA: Connecting</div>
        <div class="encoder-status" id="encoderStatus">🎬 H.264: Starting</div>
        <div class="cooldown" id="cooldown">⚡ Ready</div>
        <div class="toggle-btn" id="toggleBtn">🔄 Switch to MJPEG</div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const elements = {
            gestureIcon: document.getElementById('gestureIcon'),
            gestureName: document.getElementById('gestureName'),
            fingerCount: document.getElementById('fingerCount'),
            status: document.getElementById('status'),
            haStatus: document.getElementById('haStatus'),
            encoderStatus: document.getElementById('encoderStatus'),
            cooldown: document.getElementById('cooldown'),
            video: document.getElementById('videoStream'),
            mjpeg: document.getElementById('mjpegStream'),
            toggleBtn: document.getElementById('toggleBtn')
        };
        
        let useH264 = true;
        let socket = null;
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'action-toast';
            toast.textContent = `🎯 ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function initH264Stream() {
            elements.video.style.display = 'block';
            elements.mjpeg.style.display = 'none';
            elements.toggleBtn.textContent = '🔄 Switch to MJPEG';
            
            const mediaSource = new MediaSource();
            elements.video.src = URL.createObjectURL(mediaSource);
            let sourceBuffer = null;
            let queue = [];
            let updating = false;
            
            mediaSource.addEventListener('sourceopen', () => {
                try {
                    sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E"');
                    sourceBuffer.mode = 'sequence';
                    sourceBuffer.addEventListener('updateend', () => {
                        updating = false;
                        if (queue.length) appendToBuffer(queue.shift());
                    });
                    fetchStream();
                } catch(e) { fallbackToMJPEG(); }
            });
            
            function appendToBuffer(data) {
                if (!sourceBuffer || updating) { queue.push(data); return; }
                try { updating = true; sourceBuffer.appendBuffer(data); }
                catch(e) { fallbackToMJPEG(); }
            }
            
            async function fetchStream() {
                try {
                    const response = await fetch('/video');
                    const reader = response.body.getReader();
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        if (sourceBuffer && mediaSource.readyState === 'open')
                            appendToBuffer(value);
                    }
                } catch(e) { fallbackToMJPEG(); }
            }
        }
        
        function initMJPEGStream() {
            elements.video.style.display = 'none';
            elements.mjpeg.style.display = 'block';
            elements.mjpeg.src = '/mjpeg?_=' + Date.now();
            elements.toggleBtn.textContent = '🔄 Switch to H.264';
            
            elements.mjpeg.onerror = () => {
                elements.status.innerHTML = '❌ Stream error - reconnecting...';
                setTimeout(() => { elements.mjpeg.src = '/mjpeg?_=' + Date.now(); }, 3000);
            };
            elements.mjpeg.onload = () => {
                elements.status.innerHTML = '✅ Camera active - Show your hand!';
                elements.status.style.color = '#0f0';
            };
        }
        
        function fallbackToMJPEG() {
            if (useH264) {
                useH264 = false;
                initMJPEGStream();
            }
        }
        
        elements.toggleBtn.addEventListener('click', () => {
            useH264 = !useH264;
            if (useH264) initH264Stream();
            else initMJPEGStream();
        });
        
        function connectWebSocket() {
            socket = io({ transports: ['websocket'], reconnection: true });
            socket.on('connect', () => {
                elements.haStatus.innerHTML = '✅ HA: Connected';
                elements.haStatus.style.color = '#0f0';
            });
            socket.on('disconnect', () => {
                elements.haStatus.innerHTML = '🔌 HA: Reconnecting';
                elements.haStatus.style.color = '#ffaa00';
            });
            socket.on('gesture_update', (data) => {
                if (data.gestureIcon !== elements.gestureIcon.textContent) {
                    elements.gestureIcon.classList.add('pulse');
                    setTimeout(() => elements.gestureIcon.classList.remove('pulse'), 200);
                }
                elements.gestureIcon.textContent = data.gestureIcon;
                elements.gestureName.textContent = data.gestureName;
                elements.fingerCount.textContent = `Fingers: ${data.fingerCount}`;
                elements.status.innerHTML = data.status === 'detecting' ? '🟢 Detecting hand' : '🟡 No hand detected';
                elements.status.style.color = data.status === 'detecting' ? '#0f0' : '#ffaa00';
                elements.encoderStatus.innerHTML = data.encoderActive ? '🎬 H.264: Active' : '🎬 H.264: Inactive';
                elements.encoderStatus.style.color = data.encoderActive ? '#0f0' : '#f00';
                
                if (data.cooldownRemaining > 0) {
                    elements.cooldown.innerHTML = `⏱️ Cooldown: ${data.cooldownRemaining.toFixed(1)}s`;
                    elements.cooldown.style.color = '#ffaa00';
                } else {
                    elements.cooldown.innerHTML = '⚡ Ready';
                    elements.cooldown.style.color = '#0f0';
                }
                
                if (data.lastAction) showToast(data.lastAction);
            });
            socket.on('action_triggered', (data) => {
                elements.gestureIcon.style.transform = 'scale(1.2)';
                setTimeout(() => elements.gestureIcon.style.transform = 'scale(1)', 200);
            });
        }
        
        // Initialize
        initH264Stream();
        connectWebSocket();
        
        setInterval(async () => {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                if (!data.camera_active) elements.status.innerHTML = '⚠️ Camera inactive';
                if (!data.ha_connected) elements.haStatus.innerHTML = '🔌 HA: Disconnected';
            } catch(e) {}
        }, 10000);
    </script>
</body>
</html>
