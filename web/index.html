<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Control - Smart Home Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Main gesture display */
        .gesture-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            min-width: 200px;
            pointer-events: none;
        }

        .current-gesture {
            text-align: center;
        }

        .gesture-icon {
            font-size: 72px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .gesture-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .finger-count {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }

        .confidence-bar {
            width: 100%;
            height: 3px;
            background: #333;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: #4caf50;
            width: 0%;
            transition: width 0.2s ease;
        }

        .last-action {
            font-size: 12px;
            color: #0f0;
            margin-top: 5px;
            font-family: monospace;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 5px 0;
        }

        /* Entity status grid */
        .entity-grid {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            z-index: 1000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 280px;
            pointer-events: none;
        }

        .entity-title {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .entity-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .entity-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .entity-icon {
            font-size: 24px;
            margin-right: 12px;
        }

        .entity-info {
            flex: 1;
        }

        .entity-name {
            font-size: 12px;
            color: #fff;
            font-weight: 500;
        }

        .entity-id {
            font-size: 10px;
            color: #888;
            font-family: monospace;
        }

        .entity-status {
            font-size: 20px;
        }

        .entity-status.on {
            color: #4caf50;
        }

        .entity-status.off {
            color: #f44336;
        }

        .gesture-guide {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .guide-item {
            text-align: center;
        }

        .guide-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .guide-text {
            font-size: 10px;
            color: #ccc;
            margin-top: 3px;
        }

        .guide-entity {
            font-size: 8px;
            color: #4caf50;
            margin-top: 2px;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .ha-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffaa00;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        .fps-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 10px;
            color: #888;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .action-flash {
            animation: pulse 0.3s ease-in-out 2;
        }

        @media (max-width: 768px) {
            .gesture-display {
                padding: 10px 15px;
                min-width: 160px;
                bottom: 10px;
                right: 10px;
            }
            .gesture-icon {
                font-size: 48px;
            }
            .gesture-name {
                font-size: 14px;
            }
            .entity-grid {
                min-width: 220px;
                bottom: 10px;
                left: 10px;
                padding: 10px;
            }
            .entity-icon {
                font-size: 20px;
            }
            .entity-name {
                font-size: 10px;
            }
            .guide-icon {
                font-size: 22px;
            }
            .status, .ha-status {
                font-size: 10px;
                padding: 5px 10px;
            }
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        
        <div class="gesture-display">
            <div class="current-gesture">
                <div class="gesture-icon" id="gestureIcon">🤚</div>
                <div class="gesture-name" id="gestureName">No Hand</div>
                <div class="finger-count" id="fingerCount">Fingers: 0</div>
                <div class="confidence-bar" id="confidenceBar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
                <div class="last-action" id="lastAction">Last: --</div>
            </div>
            <div class="divider"></div>
            <div class="gesture-guide" id="gestureGuide">
                <!-- Dynamic gesture guide will be populated -->
            </div>
        </div>
        
        <div class="entity-grid" id="entityGrid">
            <div class="entity-title">🎮 CONTROLLED DEVICES</div>
            <div class="entity-items" id="entityItems">
                <!-- Dynamic entity status will be populated -->
            </div>
        </div>
        
        <div class="status" id="status">Connecting...</div>
        <div class="ha-status" id="haStatus">HA: Connecting...</div>
        <div class="fps-counter" id="fpsCounter">FPS: --</div>
    </div>

    <script>
        // Socket.IO connection
        const socket = io(window.location.origin, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000
        });
        
        // DOM elements
        const video = document.getElementById('video');
        const gestureIconEl = document.getElementById('gestureIcon');
        const gestureNameEl = document.getElementById('gestureName');
        const fingerCountEl = document.getElementById('fingerCount');
        const lastActionEl = document.getElementById('lastAction');
        const statusEl = document.getElementById('status');
        const haStatusEl = document.getElementById('haStatus');
        const fpsCounterEl = document.getElementById('fpsCounter');
        const confidenceFill = document.getElementById('confidenceFill');
        const gestureGuide = document.getElementById('gestureGuide');
        const entityItems = document.getElementById('entityItems');
        
        // Configuration
        let entityConfig = {
            entity_1: { name: "Device 1", id: "" },
            entity_2: { name: "Device 2", id: "" },
            entity_3: { name: "Device 3", id: "" },
            entity_4: { name: "Device 4", id: "" },
            entity_5: { name: "Device 5", id: "" }
        };
        
        let entityStates = {1: false, 2: false, 3: false, 4: false, 5: false};
        let resetGesture = 0;
        
        // Gesture mapping
        const gestureMap = {
            0: { icon: "✊", name: "Reset", action: "Reset all" },
            1: { icon: "☝️", name: "1 Finger", action: "Toggle Device 1" },
            2: { icon: "✌️", name: "2 Fingers", action: "Toggle Device 2" },
            3: { icon: "👌", name: "3 Fingers", action: "Toggle Device 3" },
            4: { icon: "🖖", name: "4 Fingers", action: "Toggle Device 4" },
            5: { icon: "✋", name: "Palm", action: "Toggle Device 5" }
        };
        
        // Set video source to backend stream
        video.src = '/video?t=' + Date.now();
        video.play().catch(e => console.log('Video autoplay blocked:', e));
        
        // Reload video on error
        video.addEventListener('error', (e) => {
            console.error('Video error:', e);
            statusEl.textContent = '⚠️ Video stream error, reconnecting...';
            statusEl.style.color = '#ffaa00';
            setTimeout(() => {
                video.src = '/video?t=' + Date.now();
                video.play().catch(e => console.log('Retry failed:', e));
            }, 3000);
        });
        
        // Fetch configuration
        async function fetchConfig() {
            try {
                const response = await fetch('/config');
                const config = await response.json();
                
                // Update entity config
                if (config.entities) {
                    for (let i = 1; i <= 5; i++) {
                        const entityKey = `entity_${i}`;
                        const entityId = config.entities[entityKey];
                        if (entityId) {
                            const domain = entityId.split('.')[0];
                            const name = entityId.split('.')[1] || `Device ${i}`;
                            entityConfig[entityKey] = {
                                name: name.replace(/_/g, ' ').toUpperCase(),
                                id: entityId,
                                domain: domain
                            };
                        } else {
                            entityConfig[entityKey] = {
                                name: `Device ${i}`,
                                id: "",
                                domain: "light"
                            };
                        }
                    }
                }
                
                resetGesture = config.reset_gesture || 0;
                
                // Update gesture map
                gestureMap[resetGesture] = { ...gestureMap[resetGesture], name: "Reset", action: "Reset all" };
                
                // Update UI with config
                updateGestureGuide();
                updateEntityGrid();
                
                console.log('Config loaded:', entityConfig);
            } catch (e) {
                console.error('Failed to fetch config:', e);
            }
        }
        
        function updateGestureGuide() {
            const guides = [];
            for (let i = 0; i <= 5; i++) {
                if (i === resetGesture) {
                    guides.push(`
                        <div class="guide-item">
                            <div class="guide-icon">${gestureMap[i]?.icon || '✊'}</div>
                            <div class="guide-text">${gestureMap[i]?.name || 'Reset'}</div>
                            <div class="guide-entity">Reset all</div>
                        </div>
                    `);
                } else if (i >= 1 && i <= 5 && entityConfig[`entity_${i}`]?.id) {
                    const shortName = entityConfig[`entity_${i}`].name.length > 10 ? 
                        entityConfig[`entity_${i}`].name.substring(0, 10) + '...' : 
                        entityConfig[`entity_${i}`].name;
                    guides.push(`
                        <div class="guide-item">
                            <div class="guide-icon">${gestureMap[i]?.icon || '🖐️'}</div>
                            <div class="guide-text">${gestureMap[i]?.name || i + ' Fingers'}</div>
                            <div class="guide-entity">${shortName}</div>
                        </div>
                    `);
                }
            }
            gestureGuide.innerHTML = guides.join('');
        }
        
        function updateEntityGrid() {
            const items = [];
            for (let i = 1; i <= 5; i++) {
                const entity = entityConfig[`entity_${i}`];
                if (entity && entity.id) {
                    const isOn = entityStates[i];
                    items.push(`
                        <div class="entity-item">
                            <div class="entity-icon">${getEntityIcon(entity.domain)}</div>
                            <div class="entity-info">
                                <div class="entity-name">${entity.name}</div>
                                <div class="entity-id">${entity.id}</div>
                            </div>
                            <div class="entity-status ${isOn ? 'on' : 'off'}">
                                ${isOn ? '🔆' : '💡'}
                            </div>
                        </div>
                    `);
                }
            }
            if (items.length === 0) {
                items.push(`
                    <div class="entity-item">
                        <div class="entity-info" style="text-align: center">
                            <div class="entity-name">No devices configured</div>
                            <div class="entity-id">Add entities in add-on config</div>
                        </div>
                    </div>
                `);
            }
            entityItems.innerHTML = items.join('');
        }
        
        function getEntityIcon(domain) {
            const icons = {
                'light': '💡',
                'switch': '🔌',
                'fan': '🌀',
                'cover': '🚪',
                'media_player': '📺',
                'climate': '🌡️'
            };
            return icons[domain] || '🔧';
        }
        
        // Socket event handlers
        socket.on('connect', () => {
            console.log('✅ Socket.IO connected');
            statusEl.textContent = '✅ Connected';
            statusEl.style.color = '#0f0';
            fetchConfig();
            socket.emit('get_entities');
        });
        
        socket.on('disconnect', () => {
            console.log('⚠️ Socket.IO disconnected');
            statusEl.textContent = '⚠️ Disconnected, reconnecting...';
            statusEl.style.color = '#ffaa00';
        });
        
        socket.on('status', (data) => {
            console.log('Status:', data);
            if (data.haConnected !== undefined) {
                haStatusEl.textContent = data.haConnected ? 'HA: Connected ✓' : 'HA: Disconnected ✗';
                haStatusEl.style.color = data.haConnected ? '#0f0' : '#ffaa00';
            }
            if (data.message) {
                statusEl.textContent = data.message;
            }
        });
        
        socket.on('entity_config', (data) => {
            if (data.entities) {
                for (let i = 1; i <= 5; i++) {
                    const entityKey = `entity_${i}`;
                    if (data.entities[entityKey]) {
                        const entityId = data.entities[entityKey];
                        const domain = entityId.split('.')[0];
                        const name = entityId.split('.')[1] || `Device ${i}`;
                        entityConfig[entityKey] = {
                            name: name.replace(/_/g, ' ').toUpperCase(),
                            id: entityId,
                            domain: domain
                        };
                    }
                }
                updateGestureGuide();
                updateEntityGrid();
            }
        });
        
        socket.on('entity_states', (data) => {
            if (data.states) {
                entityStates = data.states;
                updateEntityGrid();
            }
        });
        
        socket.on('gesture', (data) => {
            console.log('Gesture:', data);
            
            // Update UI with gesture info
            gestureIconEl.textContent = data.gestureIcon || getIconForFingers(data.fingerCount);
            gestureNameEl.textContent = data.gestureName || `${data.fingerCount} Fingers`;
            fingerCountEl.textContent = `Fingers: ${data.fingerCount}`;
            
            // Update confidence bar
            if (data.confidence) {
                confidenceFill.style.width = `${data.confidence * 100}%`;
                confidenceFill.style.backgroundColor = data.confidence > 0.7 ? '#4caf50' : '#ff9800';
            }
            
            if (data.lastAction && data.lastAction !== '--') {
                lastActionEl.textContent = `Last: ${data.lastAction}`;
                lastActionEl.classList.add('action-flash');
                setTimeout(() => {
                    lastActionEl.classList.remove('action-flash');
                }, 600);
            }
            
            // Update HA status
            if (data.haConnected !== undefined) {
                haStatusEl.textContent = data.haConnected ? 'HA: Connected ✓' : 'HA: Disconnected ✗';
                haStatusEl.style.color = data.haConnected ? '#0f0' : '#ffaa00';
            }
        });
        
        socket.on('gesture_update', (data) => {
            // Update gesture display
            gestureIconEl.textContent = data.gestureIcon || getIconForFingers(data.fingerCount);
            gestureNameEl.textContent = data.gestureName || `${data.fingerCount} Fingers`;
            fingerCountEl.textContent = `Fingers: ${data.fingerCount}`;
            
            if (data.lastAction && data.lastAction !== '--') {
                lastActionEl.textContent = `Last: ${data.lastAction}`;
            }
            
            if (data.haConnected !== undefined) {
                haStatusEl.textContent = data.haConnected ? 'HA: Connected ✓' : 'HA: Disconnected ✗';
                haStatusEl.style.color = data.haConnected ? '#0f0' : '#ffaa00';
            }
            
            // Update entity states
            if (data.entityStates) {
                entityStates = data.entityStates;
                updateEntityGrid();
            }
        });
        
        function getIconForFingers(count) {
            const icons = {
                0: '✊',
                1: '☝️',
                2: '✌️',
                3: '👌',
                4: '🖖',
                5: '✋'
            };
            return icons[count] || '🖐️';
        }
        
        // FPS counter from video element
        let lastFpsTime = performance.now();
        let fpsFrames = 0;
        
        function updateFPS() {
            const now = performance.now();
            fpsFrames++;
            if (now - lastFpsTime >= 1000) {
                const fps = Math.round(fpsFrames * 1000 / (now - lastFpsTime));
                fpsCounterEl.textContent = `FPS: ${fps}`;
                fpsFrames = 0;
                lastFpsTime = now;
            }
            requestAnimationFrame(updateFPS);
        }
        
        requestAnimationFrame(updateFPS);
        
        // Connection timeout fallback
        setTimeout(() => {
            if (!socket.connected) {
                statusEl.textContent = '⚠️ Waiting for connection...';
            }
        }, 3000);
        
        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && video.paused) {
                video.play().catch(e => console.log('Play on visibility change:', e));
            }
        });
        
        // Initial fetch
        fetchConfig();
    </script>
</body>
</html>
